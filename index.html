<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidhu Shekhar — Full Stack Developer & Salesforce Expert</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070F;--bg2:#0C0C1E;--cream:#EDE9DF;
  --lime:#C5FF47;--violet:#8B5FFF;--cyan:#00DEFF;
  --orange:#FF6B2B;--pink:#FF3D8A;
  --border:rgba(237,233,223,.07);--muted:rgba(237,233,223,.4);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--cream);font-family:'Inter',system-ui,sans-serif;overflow-x:hidden;cursor:none}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--lime)}

/* CURSOR */
#dot{position:fixed;width:10px;height:10px;background:var(--lime);border-radius:50%;pointer-events:none;z-index:9999;left:-20px;top:-20px;transition:width .2s,height .2s}
#ring{position:fixed;width:40px;height:40px;border:1.5px solid rgba(197,255,71,.35);border-radius:50%;pointer-events:none;z-index:9998;left:-40px;top:-40px;transition:border-color .3s}
body.hov #dot{width:14px;height:14px}
body.hov #ring{width:60px;height:60px;border-color:var(--lime)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:700;display:flex;justify-content:space-between;align-items:center;padding:24px 64px;transition:all .4s}
nav.stuck{background:rgba(7,7,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 64px}
.logo{font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;letter-spacing:3px;text-decoration:none;color:var(--cream)}
.logo-dot{color:var(--lime)}
.navr{display:flex;align-items:center;gap:36px}
.navlinks{display:flex;gap:28px}
.navlinks a{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;cursor:none}
.navlinks a:hover{color:var(--cream)}
.pill{display:flex;align-items:center;gap:7px;border:1px solid rgba(197,255,71,.25);background:rgba(197,255,71,.06);color:var(--lime);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border-radius:100px}
.pldot{width:6px;height:6px;background:var(--lime);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(197,255,71,.5)}70%{box-shadow:0 0 0 8px transparent}}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 480px 1fr;align-items:center;padding:100px 64px 60px;position:relative;overflow:hidden}

/* BG GRID */
.hgrid{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(197,255,71,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(197,255,71,.018) 1px,transparent 1px);background-size:70px 70px;animation:gridmove 40s linear infinite}
@keyframes gridmove{to{background-position:70px 70px}}

/* BG BLOBS */
.blob{position:absolute;border-radius:50%;z-index:0}
.b1{width:800px;height:800px;background:radial-gradient(circle,rgba(197,255,71,.06) 0%,transparent 60%);top:-250px;right:-150px;animation:bfloat 14s ease-in-out infinite}
.b2{width:700px;height:700px;background:radial-gradient(circle,rgba(139,95,255,.05) 0%,transparent 60%);bottom:-200px;left:-150px;animation:bfloat 18s ease-in-out infinite reverse}
.b3{width:500px;height:500px;background:radial-gradient(circle,rgba(0,222,255,.04) 0%,transparent 60%);top:40%;left:30%;animation:bfloat 10s ease-in-out infinite 3s}
@keyframes bfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-60px)}}

/* LEFT */
.hl{position:relative;z-index:2}
.badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(197,255,71,.2);background:rgba(197,255,71,.05);color:var(--lime);font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:8px 18px;border-radius:100px;margin-bottom:36px;opacity:0;animation:fadeup .7s ease forwards .2s}

@keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideup{from{opacity:0;transform:translateY(70px)}to{opacity:1;transform:translateY(0)}}

.htitle{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(64px,8vw,108px);line-height:.88;letter-spacing:3px;margin-bottom:20px}
.l1{display:block;opacity:0;animation:slideup .9s cubic-bezier(.16,1,.3,1) forwards .4s}
.l2{display:block;font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:var(--lime);font-size:.68em;letter-spacing:0;opacity:0;animation:slideup .9s cubic-bezier(.16,1,.3,1) forwards .56s}
.l3{display:block;font-family:'Inter',sans-serif;font-weight:300;font-size:.23em;letter-spacing:3px;color:var(--muted);opacity:0;animation:slideup .9s cubic-bezier(.16,1,.3,1) forwards .72s;margin-top:8px}

.hdesc{font-size:14px;line-height:1.9;color:var(--muted);max-width:360px;margin-bottom:40px;opacity:0;animation:fadeup .8s ease forwards .96s}
.hdesc strong{color:var(--cream);font-weight:600}

.hbtns{display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fadeup .8s ease forwards 1.1s}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:14px 26px;text-decoration:none;cursor:none;transition:all .3s}
.btn-lime{background:var(--lime);color:#07070F}
.btn-lime:hover{transform:translateY(-3px);box-shadow:0 20px 50px rgba(197,255,71,.3)}
.btn-ghost{border:1px solid var(--border);color:var(--cream)}
.btn-ghost:hover{border-color:rgba(197,255,71,.4);color:var(--lime);transform:translateY(-3px)}

.hstats{display:flex;gap:32px;margin-top:44px;opacity:0;animation:fadeup .8s ease forwards 1.3s}
.hsn{font-family:'Bebas Neue',Impact,sans-serif;font-size:38px;letter-spacing:2px;color:var(--lime);line-height:1}
.hsl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* CHARACTER */
.hchar{position:relative;z-index:2;display:flex;justify-content:center;align-items:flex-end;padding:30px 0}
.cw{position:relative;width:420px;height:520px;display:flex;justify-content:center;align-items:flex-end}

/* orbit rings */
.oring{position:absolute;border-radius:50%;border:1px solid;top:50%;left:50%;transform:translate(-50%,-50%)}
.or1{width:340px;height:340px;border-color:rgba(197,255,71,.05);animation:orspin 22s linear infinite}
.or2{width:420px;height:420px;border-color:rgba(139,95,255,.04);animation:orspin 32s linear infinite reverse}
@keyframes orspin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.ordot{position:absolute;width:8px;height:8px;border-radius:50%;top:-4px;left:50%;transform:translateX(-50%)}
.od1{background:var(--lime);box-shadow:0 0 12px var(--lime)}
.od2{background:var(--violet);box-shadow:0 0 12px var(--violet)}

/* float tags */
.ftag{position:absolute;background:rgba(10,10,26,.9);border:1px solid;padding:8px 14px;border-radius:9px;font-size:10px;letter-spacing:1px;z-index:5;white-space:nowrap}
.ft1{top:80px;left:-45px;border-color:rgba(197,255,71,.3);color:var(--lime);animation:ftfloat 3.5s ease-in-out infinite}
.ft2{top:210px;right:-55px;border-color:rgba(139,95,255,.3);color:var(--violet);animation:ftfloat 4s ease-in-out infinite .7s}
.ft3{bottom:120px;left:-35px;border-color:rgba(0,222,255,.3);color:var(--cyan);animation:ftfloat 3.8s ease-in-out infinite 1.4s}
.ft4{bottom:50px;right:-50px;border-color:rgba(255,107,43,.3);color:var(--orange);animation:ftfloat 3.2s ease-in-out infinite .4s}
@keyframes ftfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* speech bubble */
.bubble{position:absolute;top:0px;right:-85px;width:230px;background:rgba(10,10,26,.95);border:1px solid rgba(197,255,71,.22);border-radius:16px 16px 4px 16px;padding:16px 18px;z-index:10;opacity:0;animation:fadeup .7s ease forwards 2s}

.bubtop{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.budot{width:6px;height:6px;background:var(--lime);border-radius:50%;animation:pulse 2s infinite}
.bumode{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--lime)}
.butext{font-size:12px;line-height:1.75;color:var(--cream);min-height:52px}
.tcur{display:inline-block;width:2px;height:12px;background:var(--lime);margin-left:2px;animation:blink .7s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* SVG character */
.charsvg{width:300px;height:400px;position:relative;z-index:3;animation:charfloat 5s ease-in-out infinite;filter:drop-shadow(0 30px 60px rgba(0,0,0,.7)) drop-shadow(0 0 40px rgba(197,255,71,.1))}
@keyframes charfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* RIGHT */
.hr{position:relative;z-index:2;text-align:right}
.hrrole{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(26px,3vw,46px);letter-spacing:2px;line-height:.95;margin-bottom:26px}
.rr1{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-family:'Inter',sans-serif;font-weight:300;margin-bottom:10px;opacity:0;animation:fadeup .7s ease forwards .6s}
.rr2{display:block;color:var(--muted);opacity:0;animation:slideup .9s cubic-bezier(.16,1,.3,1) forwards .78s}
.rr3{display:block;color:var(--lime);opacity:0;animation:slideup .9s cubic-bezier(.16,1,.3,1) forwards .94s}
.rr4{display:block;color:var(--cream);opacity:0;animation:slideup .9s cubic-bezier(.16,1,.3,1) forwards 1.1s}
.hrskills{display:flex;flex-direction:column;align-items:flex-end;gap:9px;margin-top:28px;opacity:0;animation:fadeup .8s ease forwards 1.2s}
.skp{display:inline-flex;align-items:center;gap:7px;font-size:10px;letter-spacing:1px;padding:6px 14px;border-radius:6px}
.skl{background:rgba(197,255,71,.07);border:1px solid rgba(197,255,71,.2);color:var(--lime)}
.skv{background:rgba(139,95,255,.07);border:1px solid rgba(139,95,255,.2);color:var(--violet)}
.skc{background:rgba(0,222,255,.07);border:1px solid rgba(0,222,255,.2);color:var(--cyan)}
.sko{background:rgba(255,107,43,.07);border:1px solid rgba(255,107,43,.2);color:var(--orange)}

/* scroll hint */
.scrollh{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:10;opacity:0;animation:fadeup .8s ease forwards 2.2s}
.shl{width:1px;height:50px;background:linear-gradient(var(--lime),transparent);animation:shpulse 2s ease-in-out infinite}
@keyframes shpulse{0%,100%{opacity:.25}50%{opacity:1}}
.sht{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(237,233,223,.2)}

/* MARQUEE */
.mqw{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2);padding:14px 0}
.mqi{display:flex;gap:52px;white-space:nowrap;animation:mqscroll 25s linear infinite}
@keyframes mqscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mqitem{display:inline-flex;align-items:center;gap:12px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(237,233,223,.2);flex-shrink:0}
.mql{color:var(--lime)}.mqv{color:var(--violet)}.mqc{color:var(--cyan)}.mqo{color:var(--orange)}

/* SECTION SHARED */
.slbl{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--lime);display:flex;align-items:center;gap:12px;margin-bottom:16px}
.slbl::before{content:'';width:28px;height:1px;background:var(--lime);opacity:.5}
.stitle{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(42px,6vw,78px);letter-spacing:2px;line-height:.9}
.stitle em{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:var(--muted)}

/* SERVICES */
.services{padding:120px 64px}
.shead{margin-bottom:68px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}

.svc{background:var(--bg);padding:50px 40px;position:relative;overflow:hidden;opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease,background .4s}
.svc.vis{opacity:1;transform:translateY(0)}
.svc:hover{background:rgba(255,255,255,.013)}
.svcglow{position:absolute;width:260px;height:260px;border-radius:50%;filter:blur(80px);top:-70px;right:-70px;opacity:0;transition:opacity .5s;pointer-events:none}
.svc:hover .svcglow{opacity:1}
.svl .svcglow{background:rgba(197,255,71,.09)}.svv .svcglow{background:rgba(139,95,255,.09)}.svc2 .svcglow{background:rgba(0,222,255,.09)}.svo .svcglow{background:rgba(255,107,43,.09)}.svp .svcglow{background:rgba(255,61,138,.09)}
.svcicon{font-size:40px;margin-bottom:22px;display:block;line-height:1}
.svcno{font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:7px}
.svl .svcno{color:var(--lime)}.svv .svcno{color:var(--violet)}.svc2 .svcno{color:var(--cyan)}.svo .svcno{color:var(--orange)}.svp .svcno{color:var(--pink)}
.svcname{font-family:'Bebas Neue',Impact,sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:12px}
.svcdesc{font-size:12.5px;line-height:1.9;color:var(--muted);margin-bottom:22px}
.svclist{list-style:none;display:flex;flex-direction:column;gap:8px}
.svclist li{font-size:11px;color:var(--muted);padding-left:18px;position:relative;line-height:1.5}
.svclist li::before{content:'→';position:absolute;left:0;font-size:10px}
.svl .svclist li::before{color:var(--lime)}.svv .svclist li::before{color:var(--violet)}.svc2 .svclist li::before{color:var(--cyan)}.svo .svclist li::before{color:var(--orange)}.svp .svclist li::before{color:var(--pink)}
.svcfoot{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);font-size:9px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.svl .svcfoot{color:var(--lime)}.svv .svcfoot{color:var(--violet)}.svc2 .svcfoot{color:var(--cyan)}.svo .svcfoot{color:var(--orange)}.svp .svcfoot{color:var(--pink)}
.proof-ph{background:rgba(255,255,255,.01);border:1px dashed rgba(197,255,71,.18);padding:28px 36px;display:flex;align-items:center;gap:16px;margin-top:14px;transition:all .4s}
.proof-ph:hover{border-color:rgba(197,255,71,.4);background:rgba(197,255,71,.02)}
.pp-icon{font-size:26px;flex-shrink:0}
.pp-text strong{color:var(--lime);display:block;font-family:'Bebas Neue',Impact,sans-serif;font-size:17px;letter-spacing:2px;margin-bottom:4px}
.pp-text{font-size:11px;color:var(--muted);line-height:1.6}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.st{padding:54px 36px;border-right:1px solid var(--border);text-align:center;opacity:0;transform:translateY(16px);transition:opacity .7s ease,transform .7s ease,background .4s}
.st:last-child{border-right:none}
.st.vis{opacity:1;transform:translateY(0)}
.st:hover{background:rgba(255,255,255,.013)}
.stnum{font-family:'Bebas Neue',Impact,sans-serif;font-size:58px;letter-spacing:2px;line-height:1}
.cl{color:var(--lime)}.cv{color:var(--violet)}.cc{color:var(--cyan)}.co{color:var(--orange)}
.stlbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:7px}

/* SKILLS PLACEHOLDER */
.skillsec{padding:120px 64px;background:var(--bg2)}
.skillgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:72px}
.skillph{background:var(--bg2);padding:40px 36px;min-height:180px;display:flex;flex-direction:column;justify-content:space-between;opacity:0;transform:translateY(20px);transition:opacity .8s ease,transform .8s ease}
.skillph.vis{opacity:1;transform:translateY(0)}
.ph-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}

.ph-ttl{font-family:'Bebas Neue',Impact,sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:18px}
.ph-bar{height:2px;background:var(--border);border-radius:100px;margin-bottom:9px}
.ph-note{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(237,233,223,.18);margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* PROCESS */
.process{padding:120px 64px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);margin-top:72px}
.proc{padding:50px 34px;border-right:1px solid var(--border);opacity:0;transform:translateY(22px);transition:opacity .8s ease,transform .8s ease,background .4s}
.proc:last-child{border-right:none}
.proc.vis{opacity:1;transform:translateY(0)}
.proc:hover{background:rgba(255,255,255,.013)}
.procn{font-family:'Bebas Neue',Impact,sans-serif;font-size:86px;color:rgba(237,233,223,.03);letter-spacing:2px;line-height:1;margin-bottom:18px;transition:color .4s}
.proc:hover .procn{color:rgba(197,255,71,.08)}
.procicon{font-size:28px;margin-bottom:14px;display:block}
.proctitle{font-family:'Bebas Neue',Impact,sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:10px}
.procdesc{font-size:12px;line-height:1.85;color:var(--muted)}

/* HIRE */
.hiresec{padding:120px 64px;background:var(--bg2)}
.hirein{border:1px solid var(--border);padding:72px;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;align-items:center;gap:56px}
.hireglow{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(197,255,71,.055),transparent 60%);top:-150px;right:-150px;border-radius:50%;pointer-events:none;animation:bfloat 12s ease-in-out infinite}
.hire-badge{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(197,255,71,.2);background:rgba(197,255,71,.05);color:var(--lime);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:100px;margin-bottom:28px}
.hire-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(44px,5.5vw,72px);letter-spacing:2px;line-height:.88;margin-bottom:20px}
.hire-title em{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:var(--lime)}
.hire-sub{font-size:14px;line-height:1.85;color:var(--muted);max-width:460px}
.hire-sub strong{color:var(--cream)}
.hire-right{display:flex;flex-direction:column;align-items:center;gap:14px;flex-shrink:0;position:relative;z-index:2}
.upw-btn{display:flex;align-items:center;gap:10px;background:var(--lime);color:#07070F;font-weight:800;font-size:13px;padding:16px 32px;text-decoration:none;cursor:none;transition:all .3s}
.upw-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 24px 60px rgba(197,255,71,.32)}
.email-link{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;cursor:none;transition:color .3s}
.email-link:hover{color:var(--lime)}
.platrow{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.platpill{border:1px solid var(--border);color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px}

/* CONTACT */
.contact{padding:140px 64px;text-align:center;position:relative;overflow:hidden}
.cg1{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(197,255,71,.055),transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:bfloat 10s ease-in-out infinite;pointer-events:none}
.cg2{position:absolute;width:800px;height:800px;background:radial-gradient(circle,rgba(139,95,255,.04),transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:bfloat 14s ease-in-out infinite reverse;pointer-events:none}
.cin{position:relative;z-index:2}
.ctag{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:36px}

.cbig{font-family:'Bebas Neue',Impact,sans-serif;font-size:clamp(56px,9vw,128px);letter-spacing:3px;line-height:.82;margin-bottom:52px}
.cbig em{display:block;font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:var(--lime);font-size:.7em;letter-spacing:-2px}
.clinks{display:flex;justify-content:center;gap:48px;flex-wrap:wrap;margin-top:52px}
.clink{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none
